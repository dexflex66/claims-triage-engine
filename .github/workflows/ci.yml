name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        env:
          OIDC_REQUIRE_SIGNATURE: "false"
          KEY_ROTATION_ENFORCED: "false"
          MTLS_REQUIRED: "false"
          IP_ALLOWLIST_ENABLED: "false"
        run: |
          pytest -q
